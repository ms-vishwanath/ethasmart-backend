<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - ETHASMART</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="login-page">
  <div class="login">
    <div class="login-card">

      <div class="brand">
        <img src="logo 3.jpeg" alt="ETHASMART">
        <h2>ETHASMART</h2>
      </div>

      <p class="subtitle">Reset your password</p>

      <form id="forgotForm" autocomplete="off">
        <div class="field">
          <label>Username</label>
          <div class="input-wrap">
            <i class="fas fa-user"></i>
            <input type="text" id="fp_username" placeholder="Enter username" required />
          </div>
        </div>

        <div class="field">
          <label>New Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" id="fp_newpass" placeholder="Enter new password" required />
          </div>
        </div>

        <button type="submit">Update Password</button>

        <p id="fp_msg" style="margin-top:12px; color:#00f5c4; text-align:center;"></p>

        <p style="margin-top:12px; text-align:center;">
          <a href="index.html" style="color:#cbd5e1; text-decoration:none;">Back to Login</a>
        </p>
      </form>

    </div>
  </div>

  <script src="config.js"></script>
  <script src="forgot.js"></script>
</body>
</html>
